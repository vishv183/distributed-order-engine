version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exception_user
      POSTGRES_PASSWORD: exception_pass
      POSTGRES_DB: b2b_exceptions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exception_user -d b2b_exceptions"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Application ─────────────────────────────────────────
  api:
    build: .
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Celery Worker ───────────────────────────────────────────────
  celery_worker:
    build: .
    command: >
      celery -A backend.app.tasks.celery_app:celery_app worker
      --loglevel=info
      --concurrency=2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Redis Stream Consumer ──────────────────────────────────────
  stream_consumer:
    build: .
    command: python -m backend.stream_consumer
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ── React Frontend Dashboard ────────────────────────────────────
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
